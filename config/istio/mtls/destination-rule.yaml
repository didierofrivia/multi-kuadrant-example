# DestinationRule to ensure mTLS for echo-api service
# This is optional when using mesh-wide STRICT mode, but makes intent explicit
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: echo-api-mtls
  namespace: demo
spec:
  host: echo-api.demo.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
