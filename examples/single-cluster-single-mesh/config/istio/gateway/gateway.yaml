metadata:
  labels:
    istio: ingressgateway
  name: kuadrant-ingressgateway
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    hostname: "demo.10.89.0.0.nip.io"
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
