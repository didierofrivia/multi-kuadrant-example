---
# Self-signed ClusterIssuer for bootstrapping root CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# Root CA Certificate for Istio
# This certificate will be used to sign workload certificates
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: istio-root-ca
  namespace: istio-system
spec:
  # Certificate identity
  commonName: istio-root-ca
  secretName: istio-root-ca-secret

  # Certificate lifetime: 10 years (87600h)
  # Renews 1 year (8760h) before expiry
  duration: 87600h
  renewBefore: 8760h

  # Subject Alternative Names
  dnsNames:
    - "istio-root-ca.istio-system.svc"
    - "istio-root-ca.istio-system.svc.cluster.local"
    - "*.10.89.0.0.nip.io"  # Trust domain for cluster-a

  # Mark as CA certificate (enables certificate signing)
  isCA: true

  # Private key configuration
  privateKey:
    algorithm: RSA
    size: 4096

  # Use self-signed issuer to create root CA
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
