apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-api
  labels:
    app: echo-api
    mesh: mesh-1
spec:
  selector:
    matchLabels:
      app: echo-api
  template:
    metadata:
      labels:
        app: echo-api
        mesh: mesh-1
    spec:
      containers:
        - name: echo-api
          image: quay.io/3scale/authorino:echo-api
          env:
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: http
  replicas: 1
---
apiVersion: v1
kind: Service
metadata:
  name: echo-api
  labels:
    mesh: mesh-1
spec:
  selector:
    app: echo-api
  ports:
    - name: http
      port: 3000
      protocol: TCP
      targetPort: 3000
