apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: mesh-demo-apps
spec:
  parentRefs:
    - name: kuadrant-ingressgateway
      namespace: ingress-gateways
  hostnames:
    - "demo.10.89.0.0.nip.io"
  rules:
    - matches:
        - path:
            type: Exact
            value: /echo
      backendRefs:
        - name: echo-api
          port: 3000
